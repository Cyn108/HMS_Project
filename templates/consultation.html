<!DOCTYPE html>
<html>
<head>
    <title>Consultation | NSR-HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h5>Consultation: {{ patient.name }} ({{ patient.patient_custom_id }})</h5>
        </div>
        <div class="card-body">
            <form action="{{ url_for('consultation', patient_id=patient.id) }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Diagnosis</label>
                    <input type="text" name="diagnosis" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Prescription</label>
                    <textarea name="notes" class="form-control" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="follow_up" class="form-control">
                </div>
                <button type="submit" class="btn btn-success w-100">Save Prescription</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
