<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Consultation | NSR-HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .btn-medical { background-color: #00897b; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white p-3">
                    <h4 class="mb-0">Consultation Form</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info">
                        <strong>Patient:</strong> {{ patient.name }} <br>
                        <strong>ID:</strong> {{ patient.patient_custom_id }} | <strong>Age:</strong> {{ patient.age }}
                    </div>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Diagnosis / Assessment</label>
                            <input type="text" name="diagnosis" class="form-control" placeholder="Enter disease name" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Prescription & Clinical Notes</label>
                            <textarea name="notes" class="form-control" rows="6" placeholder="Instructions, medicines, and follow-up..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-medical btn-lg">Submit Final Record</button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
