<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prescription Entry | NSR-HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow border-0 mx-auto" style="max-width: 700px;">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Medical Consultation: {{ patient.name }}</h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Diagnosis / Illness</label>
                    <input type="text" name="diagnosis" class="form-control" placeholder="e.g., Seasonal Flu" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Prescription (Medicines & Dosage)</label>
                    <textarea name="notes" class="form-control" rows="6" placeholder="Enter medicine list here..." required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Follow-up Date</label>
                    <input type="date" name="follow_up" class="form-control">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Save & Issue Prescription</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
